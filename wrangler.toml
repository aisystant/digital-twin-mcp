name = "digital-twin-mcp"
main = "src/worker-sse.js"
compatibility_date = "2024-12-01"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[vars]
CORS_ORIGIN = "*"

# Secrets (set via `wrangler secret put`):
# ORY_URL       - Ory Hydra base URL (e.g. https://auth.system-school.ru/hydra)
# DATABASE_URL  - Neon PostgreSQL connection string (for digital_twins + subscription_grants)
